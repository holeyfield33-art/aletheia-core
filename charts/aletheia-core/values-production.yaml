# Aletheia Core — Production values overlay
# Usage: helm install aletheia charts/aletheia-core -f charts/aletheia-core/values-production.yaml

replicaCount: 2

config:
  mode: "active"
  logLevel: "WARNING"
  databaseBackend: "postgres"

postgresql:
  enabled: true
  # Set via --set or ExternalSecret:
  # url: "postgresql://user:pass@host:5432/aletheia?sslmode=require"
  existingSecret: "" # set to ExternalSecret name if using ESO

redis:
  enabled: true
  # url: "rediss://user:pass@host:6380"
  existingSecret: ""

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: "30s"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.aletheia-core.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: aletheia-core-tls
      hosts:
        - api.aletheia-core.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: aletheia-core
