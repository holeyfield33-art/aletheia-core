{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aletheia-core.fullname" . }}
  labels:
    {{- include "aletheia-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.receiptSecret }}
  ALETHEIA_RECEIPT_SECRET: {{ .Values.secrets.receiptSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  ALETHEIA_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  {{- end }}
  {{- if .Values.secrets.adminKey }}
  ALETHEIA_ADMIN_KEY: {{ .Values.secrets.adminKey | quote }}
  {{- end }}
  {{- if .Values.secrets.keySalt }}
  ALETHEIA_KEY_SALT: {{ .Values.secrets.keySalt | quote }}
  {{- end }}
  {{- if .Values.secrets.aliasSalt }}
  ALETHEIA_ALIAS_SALT: {{ .Values.secrets.aliasSalt | quote }}
  {{- end }}
  {{- if .Values.secrets.manifestHash }}
  ALETHEIA_MANIFEST_HASH: {{ .Values.secrets.manifestHash | quote }}
  {{- end }}
  {{- if and .Values.postgresql.enabled .Values.postgresql.url (not .Values.postgresql.existingSecret) }}
  DATABASE_URL: {{ .Values.postgresql.url | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.url (not .Values.redis.existingSecret) }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}
  {{- if and .Values.upstash.enabled (not .Values.upstash.existingSecret) }}
  {{- if .Values.upstash.restUrl }}
  UPSTASH_REDIS_REST_URL: {{ .Values.upstash.restUrl | quote }}
  {{- end }}
  {{- if .Values.upstash.restToken }}
  UPSTASH_REDIS_REST_TOKEN: {{ .Values.upstash.restToken | quote }}
  {{- end }}
  {{- end }}
{{- end }}
