services:
  - type: web
    name: aletheia-core
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn bridge.fastapi_wrapper:app --host 0.0.0.0 --port $PORT
    disks:
      - name: aletheia-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      # --- Core runtime ---
      - key: ENVIRONMENT
        sync: false
      - key: ACTIVE_MODE
        sync: false
      - key: ALETHEIA_MODE
        sync: false
      - key: ALETHEIA_LOG_LEVEL
        sync: false
      - key: ALETHEIA_LOG_PII
        sync: false
      # --- Authn / API keys ---
      - key: ALETHEIA_API_KEYS
        sync: false
      - key: ALETHEIA_ADMIN_KEY
        sync: false
      - key: SIGNING_SECRET
        sync: false
      # --- Cryptographic salts & secrets ---
      - key: ALETHEIA_RECEIPT_SECRET
        sync: false
      - key: ALETHEIA_ALIAS_SALT
        sync: false
      - key: ALETHEIA_ROTATION_SALT
        sync: false
      - key: ALETHEIA_KEY_SALT
        sync: false
      - key: ALETHEIA_MANIFEST_HASH
        sync: false
      # --- Backend / persistence ---
      - key: ALETHEIA_DATABASE_BACKEND
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALETHEIA_ALLOW_ENV_SECRETS
        sync: false
      - key: ALETHEIA_KEYSTORE_PATH
        value: /var/data/keys.db
      - key: ALETHEIA_DECISION_DB_PATH
        value: /var/data/decisions.sqlite3
      - key: ALETHEIA_AUDIT_LOG_PATH
        value: /var/data/audit.log
      # --- Network / CORS / proxy ---
      - key: ALETHEIA_CORS_ORIGINS
        sync: false
      - key: ALETHEIA_ALLOWED_BACKEND_HOSTS
        sync: false
      - key: ALETHEIA_TRUSTED_PROXY_DEPTH
        sync: false
      # --- Redis (Upstash) ---
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # --- Demo ---
      - key: ALETHEIA_DEMO_ORIGINS
        sync: false
      # Idempotent demo-key re-seed on boot. Required on ephemeral disks
      # (Render free tier with SQLite KeyStore). Safe to leave unset on
      # Postgres deployments where the key is provisioned via POST /v1/keys.
      - key: ALETHEIA_DEMO_API_KEY
        sync: false
      # --- Model / AI ---
      - key: HF_TOKEN
        sync: false
    plan: free

  - type: cron
    name: aletheia-core-warmup
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt --no-deps --ignore-requires-python || pip install -r requirements.txt
    startCommand: python scripts/render_warmup.py
    envVars:
      - key: ALETHEIA_WARMUP_URL
        value: https://aletheia-core.onrender.com
      - key: ALETHEIA_BACKEND_URL
        sync: false
      - key: ALETHEIA_BASE_URL
        sync: false
      - key: ALETHEIA_WARMUP_TIMEOUT_SECONDS
        value: "15"
      - key: ALETHEIA_WARMUP_DELAY_SECONDS
        value: "1.25"
