/var/log/aletheia/*.log {
    daily
    rotate 30
    compress
    delaycompress
    maxsize 100M
    missingok
    notifempty
    create 0600 appuser appgroup
    postrotate
        # Signal uvicorn to reopen log files
        kill -USR1 $(cat /run/aletheia.pid 2>/dev/null) 2>/dev/null || true
    endscript
}
