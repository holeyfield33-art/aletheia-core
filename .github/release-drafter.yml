name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "🧹 Maintenance"
    labels:
      - "chore"
      - "ci"
      - "refactor"
  - title: "📦 Dependencies"
    labels:
      - "dependencies"
  - title: "📖 Documentation"
    labels:
      - "documentation"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "No notable changes."

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "fix"
      - "chore"
      - "dependencies"
      - "documentation"
  default: patch

autolabeler:
  - label: "documentation"
    files:
      - "docs/**"
      - "*.md"
  - label: "bug"
    branch:
      - "/fix\\/.+/"
      - "/bug\\/.+/"
  - label: "feature"
    branch:
      - "/feat\\/.+/"
      - "/feature\\/.+/"
  - label: "chore"
    branch:
      - "/chore\\/.+/"
  - label: "security"
    files:
      - "agents/**"
      - "core/sandbox.py"
      - "core/runtime_security.py"
      - "manifest/**"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
