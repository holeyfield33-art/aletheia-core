name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'requirements-ci.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Verify version matches release tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Release tag ($TAG) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Build package
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  sbom:
    name: Generate SBOM (CycloneDX)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Generate Python SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements requirements.txt -o sbom-python.cdx.json

      - name: Generate Node SBOM
        run: |
          npm ci --no-audit --no-fund
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom-node.cdx.json

      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" sbom-python.cdx.json sbom-node.cdx.json --clobber --repo "$GITHUB_REPOSITORY"

  sign:
    name: Sigstore-sign release artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46 # v3.0.0
        with:
          # Action treats `inputs` as newline-delimited glob patterns;
          # passing them as one space-joined string can be parsed as a
          # single pattern and find no files.
          inputs: |
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Attach signatures to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # sigstore/gh-action-sigstore-python writes bundle files with the
        # *.sigstore.json suffix (see the action's signing path); the older
        # *.sigstore extension is not produced. Match both forms defensively.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          shopt -s nullglob
          BUNDLES=(dist/*.sigstore.json dist/*.sigstore)
          if [ ${#BUNDLES[@]} -eq 0 ]; then
            echo "ERROR: no Sigstore bundles found under dist/"; exit 1
          fi
          gh release upload "$TAG" "${BUNDLES[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  publish-pypi:
    name: Publish to PyPI
    needs: [build, sbom, sign]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
