name: CI

on:
  push:
    branches: [main, "feature/**", "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/aletheia/models
          key: aletheia-model-sentence-transformers-all-MiniLM-L6-v2-v1

      - name: Download embedding model
        run: |
          python - <<'EOF'
          from core.model_loader import load_cached_sentence_transformer
          load_cached_sentence_transformer("sentence-transformers/all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Compile check
        run: |
          python -m py_compile core/audit.py core/config.py core/embeddings.py \
            core/rate_limit.py core/sandbox.py server/app.py main.py

      - name: Run core tests
        # Excluded suites run in dedicated jobs to keep this lane fast:
        #   - tests/test_detectors     -> "Run detectors tests" step below
        #   - tests/test_api.py        -> "adversarial-tests" job (real-model mode)
        #   - tests/test_redteam_adversarial.py -> "adversarial-tests" job
        #   - tests/test_swarm_1000bot.py       -> performance suite (run pre-release)
        #   - tests/test_distributed_state.py   -> requires live Redis (run via integration job)
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_detectors \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run API security audit gate
        run: |
          python scripts/api_audit_gate.py --verbose
        env:
          ENVIRONMENT: test
          ALETHEIA_AUTH_DISABLED: "true"
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run detectors tests
        run: python -m pytest tests/test_detectors/ -v --tb=short

  adversarial-tests:
    name: Red-team adversarial suite (174 cases, real-model mode)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt', 'requirements-ci.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/aletheia/models
          key: aletheia-model-sentence-transformers-all-MiniLM-L6-v2-v1

      - name: Download embedding model
        run: |
          python - <<'EOF'
          from core.model_loader import load_cached_sentence_transformer
          load_cached_sentence_transformer("sentence-transformers/all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Run full red-team suite (stubs disabled, real model in active mode)
        env:
          ALETHEIA_MODE: active
          ALETHEIA_AUTH_DISABLED: "true"
          ALETHEIA_RECEIPT_SECRET: ci-adversarial-receipt-secret-32c # pragma: allowlist secret
          ALETHEIA_DISABLE_TEST_STUBS: "true"
          ALETHEIA_LOG_LEVEL: WARNING
        run: |
          python -m pytest \
            tests/test_redteam_adversarial.py \
            tests/test_redteam_fixes.py \
            tests/test_redteam_hardening.py \
            tests/test_api.py \
            -v --tb=short --strict-markers

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt
          pip install pytest-cov

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/aletheia/models
          key: aletheia-model-sentence-transformers-all-MiniLM-L6-v2-v1

      - name: Download embedding model
        run: |
          python - <<'EOF'
          from core.model_loader import load_cached_sentence_transformer
          load_cached_sentence_transformer("sentence-transformers/all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Run tests with coverage
        # Excluded suites and where they actually run (per CONTRIBUTING.md
        # "CI Exclusions Policy"):
        #   - tests/test_detectors     -> "Run detectors tests" step in `test` job
        #   - tests/test_api.py        -> "adversarial-tests" job (real-model mode)
        #   - tests/test_redteam_adversarial.py -> "adversarial-tests" job
        #   - tests/test_swarm_1000bot.py       -> performance suite (run pre-release)
        #   - tests/test_distributed_state.py   -> requires live Redis (run via integration job)
        run: |
          python -m pytest tests/ --cov=core --cov=server --cov=agents --cov-report=xml \
            --ignore=tests/test_detectors \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Next.js typecheck / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Check internal links
        run: python scripts/check_internal_links.py
      - name: Vitest unit tests
        run: npx vitest run
      - name: Build
        env:
          # next build wants these defined; values are placeholders for CI.
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-only-placeholder-secret-must-be-32-bytes # pragma: allowlist secret
          DATABASE_URL: postgresql://localhost:5432/ci?schema=public
        run: npx next build

  env-var-inventory:
    name: Env var inventory drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Scan env usage and compare with canonical doc
        run: node scripts/ci/check-env-consistency.mjs --check=inventory

  env-doc-consistency:
    name: Env var docs consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ensure required env lists stay in sync with canonical matrix
        run: node scripts/ci/check-env-consistency.mjs --check=docs

  env-example-validation:
    name: .env.example validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ensure .env.example contains required variables
        run: node scripts/ci/check-env-consistency.mjs --check=env-example

  install-smoke:
    name: Public-API install smoke (wheel -> fresh venv)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        # The wheel install pulls torch + sentence-transformers + their CUDA
        # deps from PyPI; without this cache cold runners spend 5-8 minutes
        # just downloading, occasionally hitting the 15-minute timeout.
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py3.12-smoke-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py3.12-smoke-
            ${{ runner.os }}-py3.12-

      - name: Build distribution
        run: |
          pip install --upgrade build
          python -m build --wheel

      - name: Install wheel into clean venv (outside source tree)
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist/*.whl

      - name: Import public API from a directory with no source on path
        # cd to /tmp so Python can't pick up the in-tree packages — the wheel
        # install is the only thing that can satisfy the imports.
        run: |
          cd /tmp
          /tmp/smoke-venv/bin/python - <<'EOF'
          import aletheia_core
          from aletheia_core import (
              Scout,
              Nitpicker,
              Judge,
              AgentTrifectaContext,
              evaluate_agent_trifecta,
          )
          assert aletheia_core.__version__, "version string missing"
          print(f"aletheia_core {aletheia_core.__version__} — public API importable from wheel install")
          EOF
