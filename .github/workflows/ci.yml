name: CI

on:
  push:
    branches: [main, "feature/**", "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/aletheia/models
          key: aletheia-model-sentence-transformers-all-MiniLM-L6-v2-v1

      - name: Download embedding model
        run: |
          python - <<'EOF'
          from core.model_loader import load_cached_sentence_transformer
          load_cached_sentence_transformer("sentence-transformers/all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Compile check
        run: |
          python -m py_compile core/audit.py core/config.py core/embeddings.py \
            core/rate_limit.py core/sandbox.py bridge/fastapi_wrapper.py main.py

      - name: Run core tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_proximity \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py \
            --ignore=tests/test_spectral_rigidity.py \
            --ignore=tests/test_swarm_detector.py \
            --ignore=tests/test_unified_audit.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run proximity tests
        run: python -m pytest tests/test_proximity/ -v --tb=short

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt
          pip install pytest-cov

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/aletheia/models
          key: aletheia-model-sentence-transformers-all-MiniLM-L6-v2-v1

      - name: Download embedding model
        run: |
          python - <<'EOF'
          from core.model_loader import load_cached_sentence_transformer
          load_cached_sentence_transformer("sentence-transformers/all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=core --cov=bridge --cov=agents --cov-report=xml \
            --ignore=tests/test_proximity \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Next.js typecheck / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Check internal links
        run: python scripts/check_internal_links.py
      - name: Vitest unit tests
        run: npx vitest run
      - name: Build
        env:
          # next build wants these defined; values are placeholders for CI.
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-only-placeholder-secret-must-be-32-bytes # pragma: allowlist secret
          DATABASE_URL: postgresql://localhost:5432/ci?schema=public
        run: npx next build
