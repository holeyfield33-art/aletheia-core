name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ci.txt

      - name: Compile check
        run: |
          python -m py_compile core/audit.py core/config.py core/embeddings.py \
            core/rate_limit.py core/sandbox.py bridge/fastapi_wrapper.py main.py

      - name: Run core tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_proximity \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_MODE: shadow
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run proximity tests
        run: python -m pytest tests/test_proximity/ -v --tb=short

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage
        run: |
          pytest --cov=core --cov=bridge --cov=agents --cov-report=xml
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
