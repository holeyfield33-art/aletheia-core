name: Release & Version Sync

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  version-check:
    name: Validate version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Extract versions and compare
        run: |
          PYPROJECT_VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M)
          print(m.group(1))
          ")
          echo "pyproject.toml version: $PYPROJECT_VERSION"

          API_VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('server/app.py').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")
          echo "server/app.py version: $API_VERSION"

          if [ "$PYPROJECT_VERSION" != "$API_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VERSION, server/app.py=$API_VERSION"
            exit 1
          fi

          echo "All versions match: $PYPROJECT_VERSION"

  test:
    name: Run test suite
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-detectors.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-detectors.txt
          pip install -e .

      - name: Run core tests
        # Excluded suites run in dedicated jobs:
        #   - tests/test_detectors / test_api / test_redteam_adversarial ->
        #     "adversarial-tests" job in ci.yml (real-model, active-mode)
        #   - tests/test_swarm_1000bot.py     -> performance suite (pre-release)
        #   - tests/test_distributed_state.py -> requires live Redis
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_detectors \
            --ignore=tests/test_api.py \
            --ignore=tests/test_redteam_adversarial.py \
            --ignore=tests/test_swarm_1000bot.py \
            --ignore=tests/test_distributed_state.py
        env:
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run detectors tests
        run: python -m pytest tests/test_detectors/ -v --tb=short

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        continue-on-error: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
