name: Release & Version Sync

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  version-check:
    name: Validate version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract versions and compare
        run: |
          PYPROJECT_VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M)
          print(m.group(1))
          ")
          echo "pyproject.toml version: $PYPROJECT_VERSION"

          API_VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('bridge/fastapi_wrapper.py').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")
          echo "fastapi_wrapper.py version: $API_VERSION"

          if [ "$PYPROJECT_VERSION" != "$API_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VERSION, fastapi_wrapper.py=$API_VERSION"
            exit 1
          fi

          echo "All versions match: $PYPROJECT_VERSION"

  test:
    name: Run test suite
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-proximity.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-proximity.txt
          pip install -e .

      - name: Run core tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_proximity \
            --ignore=tests/test_api.py
        env:
          ALETHEIA_MODE: shadow
          ALETHEIA_LOG_LEVEL: WARNING

      - name: Run proximity tests
        run: python -m pytest tests/test_proximity/ -v --tb=short

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        continue-on-error: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
