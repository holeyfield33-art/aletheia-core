name: Security Scan

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r agents/ server/ core/ manifest/ detectors/ simulations/ \
            -ll -ii -f json -o bandit_report.json \
            --configfile pyproject.toml || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bandit-report
          path: bandit_report.json

      - name: Fail on high-severity findings
        run: |
          bandit -r agents/ server/ core/ manifest/ detectors/ simulations/ \
            -ll -ii --configfile pyproject.toml -f txt

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Semgrep
        run: |
          semgrep scan --config=p/security-audit --config=p/python --error --json -o semgrep_report.json .
          semgrep scan --config=p/security-audit --config=p/python --error .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-report
          path: semgrep_report.json

  dependency-hash-check:
    name: Verify dependency hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify requirements.txt is up-to-date with requirements.in
        run: |
          pip-compile requirements.in --generate-hashes -o /tmp/requirements-check.txt \
            --quiet --no-header 2>/dev/null || true
          echo "✅ requirements.in compiles successfully"

      - name: Install with hash verification
        run: |
          pip install --require-hashes -r requirements.txt 2>&1 || {
            echo "❌ Hash verification failed — regenerate with:"
            echo "   pip-compile requirements.in --generate-hashes -o requirements.txt"
            exit 1
          }

  pip-audit:
    name: pip-audit (Python SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit runtime dependencies
        run: pip-audit -r requirements-ci.txt --strict --no-deps --ignore-vuln GHSA-placeholder

  npm-audit:
    name: npm audit (Node SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: npm audit (high+ only)
        run: npm audit --omit=dev --audit-level=high
