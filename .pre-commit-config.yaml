# See https://pre-commit.com for docs
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # Broad secret-pattern detection. Catches AWS/Stripe/GitHub/Slack tokens
  # that the existing detect-private-key hook misses. Operators must commit
  # a .secrets.baseline (run: detect-secrets scan > .secrets.baseline).
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "^(package-lock\\.json|requirements\\.txt|.*\\.svg)$"

  - repo: local
    hooks:
      - id: version-sync
        name: Check version consistency
        entry: python scripts/check_version_sync.py
        language: python
        files: "(pyproject\\.toml|package\\.json|main\\.py|bridge/fastapi_wrapper\\.py)$"
        pass_filenames: false

      - id: no-cors-wildcard
        name: Block CORS wildcard in config
        entry: >
          bash -c 'if grep -rn "CORS.*\*\|cors.*\*\|allow_origins.*\*" "$@" 2>/dev/null | grep -v "^Binary"; then echo "ERROR - CORS wildcard (*) detected. Use explicit origins."; exit 1; fi' --
        language: system
        files: "\\.py$|\\.yaml$|\\.yml$|\\.json$|\\.env$|\\.toml$"
        exclude: "^\\.pre-commit-config\\.yaml$|^bridge/fastapi_wrapper\\.py$"
        types: [text]
